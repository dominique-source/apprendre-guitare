<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Quest — Apprends la guitare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Screens are injected by JS -->
  </div>

  <div id="hud" class="hud hidden">
    <div class="hud-left">
      <button class="btn-icon" id="btn-home" title="Accueil">🏠</button>
      <div class="streak-badge" id="streak-display">
        <span class="streak-fire">🔥</span>
        <span id="streak-count">0</span>
      </div>
    </div>
    <div class="hud-center">
      <div class="xp-bar-container">
        <div class="xp-level-label" id="hud-level">Newbie</div>
        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill"></div>
        </div>
        <div class="xp-label" id="xp-label">0 XP</div>
      </div>
    </div>
    <div class="hud-right">
      <button class="btn-icon" id="btn-badges" title="Collection">🏆</button>
    </div>
  </div>

  <!-- Overlay for transitions and rewards -->
  <div id="overlay" class="overlay hidden"></div>
  <div id="toast" class="toast hidden"></div>
  <canvas id="confetti-canvas"></canvas>

  <script src="js/progress.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/guitarNeck.js"></script>
  <script src="js/metronome.js"></script>
  <script src="js/worlds/fredz.js"></script>
  <script src="js/worlds/leloup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
